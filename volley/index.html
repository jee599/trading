<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Spark Volley</title>
  </head>
  <body>
    <div id="app">
      <div class="page-shell">
        <section class="hero-card">
          <div class="hero-copy">
            <p class="eyebrow">REAL-TIME ROOM DUEL</p>
            <h1>SPARK VOLLEY</h1>
            <p class="lede">
              피카츄 배구 감성의 빠른 랠리를 웹에서 바로 즐길 수 있게 만든
              1대1 멀티플레이 MVP입니다.
            </p>
          </div>
          <div class="hero-controls">
            <label class="field">
              <span>닉네임</span>
              <input id="nickname-input" maxlength="16" value="Spark Ace" />
            </label>
            <div class="field-row">
              <label class="field grow">
                <span>룸 코드</span>
                <input
                  id="room-code-input"
                  maxlength="6"
                  placeholder="ABCD"
                />
              </label>
              <button id="copy-room-button" class="ghost" type="button">
                코드 복사
              </button>
            </div>
            <div class="button-row">
              <button id="create-room-button" type="button">방 만들기</button>
              <button id="join-room-button" class="ghost" type="button">
                입장하기
              </button>
            </div>
            <p id="status-text" class="status-text">
              서버에 연결하고 방을 만들면 바로 시작할 수 있습니다.
            </p>
            <p class="hint-text">
              조작: ← → / A D 이동, ↑ / W 점프, Space / Shift 파워 히트
            </p>
          </div>
        </section>
        <section class="arena-card">
          <div class="hud-bar">
            <div class="hud-pill">
              <span class="hud-label">ROOM</span>
              <strong id="room-code-label">----</strong>
            </div>
            <div class="hud-pill">
              <span class="hud-label">SIDE</span>
              <strong id="side-label">대기</strong>
            </div>
            <div class="hud-pill score-pill">
              <span class="hud-label">SCORE</span>
              <strong id="score-label">0 : 0</strong>
            </div>
            <div class="hud-pill phase-pill">
              <span class="hud-label">PHASE</span>
              <strong id="phase-label">LOBBY</strong>
            </div>
          </div>
          <div id="game-shell" class="game-shell"></div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
